version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: chat-postgres
    restart: always
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: chat-redis
    ports:
      - "6379:6379"