version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: chat-postgres
    restart: always
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: chat-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: chat_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  api1:
    container_name: chat-api1
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://chat:chat@postgres:5432/chat
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: chat-attachments
      JWT_ACCESS_SECRET: supersecretaccess
      JWT_REFRESH_SECRET: supersecretrefresh
      S3_PUBLIC_URL: http://localhost:9000
      CLAMSCAN_HOST: clamav
    depends_on:
      - postgres
      - redis
      - minio
      - clamav

  api2:
    container_name: chat-api2
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://chat:chat@postgres:5432/chat
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: chat-attachments
      JWT_ACCESS_SECRET: supersecretaccess
      JWT_REFRESH_SECRET: supersecretrefresh
      S3_PUBLIC_URL: http://localhost:9000
      CLAMSCAN_HOST: clamav
    depends_on:
      - postgres
      - redis
      - minio
      - clamav

  nginx:
    container_name: chat-nginx
    image: nginx:alpine
    volumes:
      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"
    depends_on:
      - api1
      - api2

  clamav:
    image: clamav/clamav:stable
    container_name: chat-clamav
    ports:
      - "3310:3310"

  virus-worker:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://chat:chat@postgres:5432/chat
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET: chat-attachments
      JWT_ACCESS_SECRET: supersecretaccess
      JWT_REFRESH_SECRET: supersecretrefresh
      S3_PUBLIC_URL: http://localhost:9000
      CLAMSCAN: clamav
    command: node apps/api/dist/apps/api/src/infra/queue/virus/virus.worker.js
    depends_on:
      - redis
      - clamav

volumes:
  minio_data:
